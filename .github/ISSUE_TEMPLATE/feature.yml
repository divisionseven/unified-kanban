name: Feature Request
description: Suggest a new feature or enhancement for Unified Kanban
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: A clear description of the problem this feature would solve.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear description of the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
