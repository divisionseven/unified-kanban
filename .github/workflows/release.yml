# ──────────────────────────────────────────────────────────────────────────────
# .github/workflows/publish.yml
#
# Single-Job Tag-Based Publishing
# ──────────────────────────────────────────────────────────────────────────────
# Trigger: Push a version tag — v1.2.3, v2.0.0-beta.1, etc.
#
# Pipeline (single job, all steps run sequentially):
#
#   checkout ─► setup ─► npm ci ─► version check ─► build ─► package
#             ─► GitHub release ─► VS Code Marketplace ─► Open VSX
#
# Prerequisites:
#   - Version in package.json must match the tag
#   - CHANGELOG.md must have an entry for this version
#   - All CI tests must pass before tagging (enforced by workflow rules)
#
# Required secrets:
#   - VSCE_PAT: Personal access token for VS Code Marketplace
#   - OVSX_PAT: Personal access token for Open VSX
#
# ──────────────────────────────────────────────────────────────────────────────

name: Publish to Marketplace

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # stable:      v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*" # pre-release: v1.2.3-beta.1

permissions:
  contents: write # required to create GitHub Releases

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false # never cancel a publish in progress

# ── PROJECT VARIABLES ─────────────────────────────────────────────────────────
env:
  PROJECT_NAME: "unified-kanban"
  REPO: "${{ github.repository }}"
  LOGO_LIGHT: "https://raw.githubusercontent.com/divisionseven/unifiedkanban/main/docs/assets/brand/banner.png"
  LOGO_DARK: "https://raw.githubusercontent.com/divisionseven/unifiedkanban/main/docs/assets/brand/banner.png"
  LOGO_WIDTH: "200"

# ──────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Job: Publish ───────────────────────────────────────────────────────────────
  publish:
    name: Publish Extension
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout (full history for git log in release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Set up Node.js ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Set up Python ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Install dependencies ─────────────────────────────────────────
      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install webview-ui dependencies
        run: |
          cd webview-ui && npm ci --legacy-peer-deps

      # ── Version pre-check ────────────────────────────────────────────────
      # Verify version consistency before building — fail fast if mismatch
      - name: Check version consistency
        run: |
          python3 .github/scripts/check-version.py "${{ github.ref_name }}"

      # ── Build ─────────────────────────────────────────────────────
      - name: Build extension
        run: npm run build

      # ── Package VSIX ───────────────────────────────────────────
      - name: Package VSIX
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx @vscode/vsce package --version "$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "vsix_file=$(ls *.vsix)" >> $GITHUB_OUTPUT

      # ── Create GitHub Release ────────────────────────────────────────
      # Build professional release notes with logo, changelog, and commit history
      - name: Build release body
        id: release-body
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Detect pre-release
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          python3 .github/scripts/build-release-notes.py \
            --version     "$VERSION" \
            --repo      "${{ env.REPO }}" \
            --project   "${{ env.PROJECT_NAME }}" \
            --changelog CHANGELOG.md \
            --logo-light "${{ env.LOGO_LIGHT }}" \
            --logo-dark  "${{ env.LOGO_DARK }}" \
            --logo-width "${{ env.LOGO_WIDTH }}" \
            ${PRERELEASE_FLAG} \
            > /tmp/release-body.md

          echo "── Release body preview (first 40 lines) ─────────────────────"
          head -40 /tmp/release-body.md
          echo "──────────────────────────────────────────────────────────"

      - name: Upload VSIX for release
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          retention-days: 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ env.PROJECT_NAME }} ${{ github.ref_name }}"
          body_path: /tmp/release-body.md
          draft: false
          make_latest: ${{ !contains(github.ref_name, '-') }}
          files: "*.vsix"
          fail_on_unmatched_files: true

      # ── Publish to VS Code Marketplace ───────────────────────────────
      - name: Publish to VS Code Marketplace
        run: |
          npx @vscode/vsce publish --file *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # ── Publish to Open VSX ────────────────────────────────────────
      - name: Publish to Open VSX Registry
        run: |
          npx ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      # ── Summary ─────────────────────────────────────────────────
      - name: Publish summary
        run: |
          echo "---"
          echo "✅ Published: ${{ env.PROJECT_NAME }} v${{ steps.package.outputs.version }}"
          echo "📦 VSIX: ${{ steps.package.outputs.vsix_file }}"
          echo "🔗 GitHub Release: https://github.com/${{ env.REPO }}/releases/tag/${{ github.ref_name }}"
          echo "---"
