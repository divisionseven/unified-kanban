name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: cd webview-ui && npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm test
      - name: Run webview tests
        run: cd webview-ui && npx vitest run
      - run: npm run build
