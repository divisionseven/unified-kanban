name: Update Version Badge

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version badge
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # The badge format is: /badge/Version-X.Y.Z-color.svg?style=plastic
          # We need to replace just the version number (X.Y.Z)
          sed -i "s|Version-[0-9]\+\.[0-9]\+\.[0-9]\+|Version-${VERSION}|g" README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update version badge to ${{ github.event.release.tag_name }}"
          git push
